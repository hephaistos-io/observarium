# Index the observarium-quarkus JAR so ArC discovers its CDI beans
quarkus.index-dependency.observarium.group-id=io.hephaistos
quarkus.index-dependency.observarium.artifact-id=observarium-quarkus

# The PostingServiceFactory SPI reads dynamic keys (e.g. observarium.jira.*, observarium.email.*)
# that are not declared in the @ConfigMapping interface. SmallRye Config's strict validation rejects
# these as unknown properties. This setting disables that validation globally — it also means typos
# in other config keys will not be caught at startup.
smallrye.config.mapping.validate-unknown=false

observarium.enabled=true

observarium.jira.enabled=false
observarium.jira.base-url=${JIRA_BASE_URL:https://company.atlassian.net}
observarium.jira.username=${JIRA_USERNAME:}
observarium.jira.api-token=${JIRA_API_TOKEN:}
observarium.jira.project-key=${JIRA_PROJECT_KEY:}

observarium.email.enabled=false
observarium.email.smtp-host=${EMAIL_SMTP_HOST:smtp.gmail.com}
observarium.email.smtp-port=${EMAIL_SMTP_PORT:587}
observarium.email.from=${EMAIL_FROM:}
observarium.email.to=${EMAIL_TO:}
observarium.email.username=${EMAIL_USERNAME:}
observarium.email.password=${EMAIL_PASSWORD:}
